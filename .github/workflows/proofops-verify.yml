name: ProofOps Runtime Verification
run-name: ProofOps verification ${{ inputs.request_id }}

on:
  workflow_dispatch:
    inputs:
      request_id:
        description: Durable ProofOps verification request ID
        required: true
        type: string
      task_id:
        description: ProofOps task ID
        required: true
        type: string
      environment:
        description: GitHub Environment to verify
        required: true
        type: choice
        options:
          - develop
          - prod
      commit_sha:
        description: Full commit SHA to verify
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  verify:
    name: Read-only runtime verification
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      PROOFOPS_REQUEST_ID: ${{ inputs.request_id }}
      PROOFOPS_TASK_ID: ${{ inputs.task_id }}
      PROOFOPS_ENVIRONMENT: ${{ inputs.environment }}
      PROOFOPS_COMMIT_SHA: ${{ inputs.commit_sha }}
      PROOFOPS_AWS_ROLE_ARN: ${{ vars.PROOFOPS_AWS_ROLE_ARN }}
      PROOFOPS_ECS_CLUSTER: ${{ vars.PROOFOPS_ECS_CLUSTER }}
      PROOFOPS_ECS_SERVICE: ${{ vars.PROOFOPS_ECS_SERVICE }}
      PROOFOPS_HEALTHCHECK_URL: ${{ vars.PROOFOPS_HEALTHCHECK_URL }}
      PROOFOPS_EVIDENCE_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - name: Configure short-lived AWS credentials
        id: aws_auth
        if: env.PROOFOPS_AWS_ROLE_ARN != ''
        continue-on-error: true
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885
        with:
          role-to-assume: ${{ env.PROOFOPS_AWS_ROLE_ARN }}
          aws-region: ap-northeast-2

      - name: Verify runtime without mutation
        id: runtime
        shell: bash
        run: |
          set +e

          deployment_status="unobservable"
          deployment_summary="AWS 런타임을 관측하지 못했다."
          image_provenance_status="unobservable"
          ecs_status="unobservable"
          ecs_summary="ECS 서비스를 관측하지 못했다."
          alb_status="unobservable"
          alb_summary="ALB 대상 상태를 관측하지 못했다."
          api_status="unobservable"
          api_summary="상태 확인 API 주소가 구성되지 않았다."

          if [[ "${{ steps.aws_auth.outcome }}" == "success" && -n "$PROOFOPS_ECS_CLUSTER" && -n "$PROOFOPS_ECS_SERVICE" ]]; then
            service_json="$(aws ecs describe-services \
              --cluster "$PROOFOPS_ECS_CLUSTER" \
              --services "$PROOFOPS_ECS_SERVICE" \
              --output json 2>/dev/null)"
            service_count="$(jq -r '.services | length' <<<"$service_json" 2>/dev/null)"

            if [[ "$service_count" == "1" ]]; then
              desired="$(jq -r '.services[0].desiredCount // 0' <<<"$service_json")"
              running="$(jq -r '.services[0].runningCount // 0' <<<"$service_json")"
              rollout="$(jq -r '[.services[0].deployments[]? | select(.status == "PRIMARY")][0].rolloutState // "UNKNOWN"' <<<"$service_json")"
              task_definition="$(jq -r '[.services[0].deployments[]? | select(.status == "PRIMARY")][0].taskDefinition // empty' <<<"$service_json")"
              service_status="$(jq -r '.services[0].status // "UNKNOWN"' <<<"$service_json")"

              if [[ -n "$task_definition" ]]; then
                task_definition_json="$(aws ecs describe-task-definition \
                  --task-definition "$task_definition" \
                  --output json 2>/dev/null)"
                essential_image_count="$(jq -r '[.taskDefinition.containerDefinitions[]? | select(.essential != false) | .image] | length' <<<"$task_definition_json" 2>/dev/null)"
                matching_image_count="$(jq -r --arg sha "$PROOFOPS_COMMIT_SHA" '[.taskDefinition.containerDefinitions[]? | select(.essential != false) | .image | ascii_downcase | select(test("(^|[^0-9a-f])" + ($sha | ascii_downcase) + "([^0-9a-f]|$)"))] | length' <<<"$task_definition_json" 2>/dev/null)"
                if [[ "$essential_image_count" -gt 0 && "$matching_image_count" == "$essential_image_count" ]]; then
                  image_provenance_status="passed"
                else
                  image_provenance_status="failed"
                fi
              fi

              if [[ "$rollout" == "COMPLETED" && "$desired" -gt 0 && "$running" == "$desired" && "$image_provenance_status" == "passed" ]]; then
                deployment_status="passed"
                deployment_summary="현재 ECS 배포가 안정 상태이고 대상 commit SHA 이미지가 실행 중이다."
              elif [[ "$rollout" == "COMPLETED" && "$desired" -gt 0 && "$running" == "$desired" && "$image_provenance_status" == "unobservable" ]]; then
                deployment_status="unobservable"
                deployment_summary="ECS 배포는 안정 상태지만 실행 이미지의 commit SHA를 관측하지 못했다."
              else
                deployment_status="failed"
                deployment_summary="ECS 배포가 불안정하거나 실행 이미지가 대상 commit SHA와 다르다."
              fi

              if [[ "$service_status" == "ACTIVE" && "$desired" -gt 0 && "$running" == "$desired" ]]; then
                ecs_status="passed"
                ecs_summary="ECS 서비스의 desired count와 running count가 일치한다."
              else
                ecs_status="failed"
                ecs_summary="ECS 서비스가 ACTIVE 또는 안정 count 상태가 아니다."
              fi

              target_group_arn="$(jq -r '.services[0].loadBalancers[0].targetGroupArn // empty' <<<"$service_json")"
              if [[ -n "$target_group_arn" ]]; then
                target_json="$(aws elbv2 describe-target-health \
                  --target-group-arn "$target_group_arn" \
                  --output json 2>/dev/null)"
                target_count="$(jq -r '.TargetHealthDescriptions | length' <<<"$target_json" 2>/dev/null)"
                unhealthy_count="$(jq -r '[.TargetHealthDescriptions[]? | select(.TargetHealth.State != "healthy")] | length' <<<"$target_json" 2>/dev/null)"
                if [[ "$target_count" -gt 0 && "$unhealthy_count" == "0" ]]; then
                  alb_status="passed"
                  alb_summary="ALB 등록 대상이 모두 healthy 상태다."
                else
                  alb_status="failed"
                  alb_summary="ALB 등록 대상이 없거나 healthy가 아닌 대상이 있다."
                fi
              fi
            fi
          fi

          if [[ -n "$PROOFOPS_HEALTHCHECK_URL" ]]; then
            if curl --fail --silent --show-error \
              --connect-timeout 5 --max-time 15 \
              --output /dev/null "$PROOFOPS_HEALTHCHECK_URL"; then
              api_status="passed"
              api_summary="상태 확인 API가 성공 응답을 반환했다."
            else
              api_status="failed"
              api_summary="상태 확인 API가 성공 응답을 반환하지 않았다."
            fi
          fi

          result_status="passed"
          for check_status in "$deployment_status" "$ecs_status" "$alb_status" "$api_status"; do
            if [[ "$check_status" == "failed" ]]; then
              result_status="failed"
              break
            fi
            if [[ "$check_status" != "passed" ]]; then
              result_status="unobservable"
            fi
          done

          jq -n \
            --arg request_id "$PROOFOPS_REQUEST_ID" \
            --arg task_id "$PROOFOPS_TASK_ID" \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg environment "$PROOFOPS_ENVIRONMENT" \
            --arg commit_sha "$PROOFOPS_COMMIT_SHA" \
            --arg status "$result_status" \
            --arg evidence_url "$PROOFOPS_EVIDENCE_URL" \
            --arg deployment_status "$deployment_status" \
            --arg deployment_summary "$deployment_summary" \
            --arg ecs_status "$ecs_status" \
            --arg ecs_summary "$ecs_summary" \
            --arg alb_status "$alb_status" \
            --arg alb_summary "$alb_summary" \
            --arg api_status "$api_status" \
            --arg api_summary "$api_summary" \
            --arg observed_at "$(date -u +%Y-%m-%dT%H:%M:%S.000Z)" \
            '{
              schemaVersion: 1,
              requestId: $request_id,
              taskId: $task_id,
              repository: $repository,
              environment: $environment,
              commitSha: $commit_sha,
              status: $status,
              checks: [
                {name: "deployment", status: $deployment_status, evidenceUrl: $evidence_url, summary: $deployment_summary},
                {name: "ecs", status: $ecs_status, evidenceUrl: $evidence_url, summary: $ecs_summary},
                {name: "alb", status: $alb_status, evidenceUrl: $evidence_url, summary: $alb_summary},
                {name: "api", status: $api_status, evidenceUrl: $evidence_url, summary: $api_summary},
                {name: "sentry", status: "skipped", summary: "공통 템플릿의 필수 관측 대상이 아니다."}
              ],
              observedAt: $observed_at
            }' > proofops-verification-result.json

          [[ "$result_status" == "passed" ]]

      - name: Upload standardized verification result
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: proofops-verification-${{ inputs.request_id }}
          path: proofops-verification-result.json
          if-no-files-found: error
          retention-days: 14
