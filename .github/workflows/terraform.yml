name: Terraform

on:
  workflow_dispatch:
    inputs:
      target:
        description: 실행할 Terraform root를 선택합니다.
        required: true
        type: choice
        default: develop
        options:
          - develop
          - production
      operation:
        description: plan만 실행할지, 환경 승인 후 apply까지 실행할지 선택합니다.
        required: true
        type: choice
        default: plan-only
        options:
          - plan-only
          - plan-and-apply
      confirm_environment:
        description: production apply를 허용하려면 production을 입력합니다. 그 외에는 비워 둡니다.
        required: false
        type: string
        default: ""

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-${{ inputs.target }}
  cancel-in-progress: false

env:
  AWS_REGION: ap-northeast-2
  TF_IN_AUTOMATION: "true"

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    environment: terraform-plan-${{ inputs.target }}
    outputs:
      apply-environment: ${{ steps.target.outputs.apply-environment }}
      plan-file: ${{ steps.target.outputs.plan-file }}
      root: ${{ steps.target.outputs.root }}
      state-key: ${{ steps.target.outputs.state-key }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Resolve Terraform root
        id: target
        env:
          TARGET: ${{ inputs.target }}
        run: |
          case "$TARGET" in
            develop)
              echo "root=environments/dev" >> "$GITHUB_OUTPUT"
              echo "plan-file=develop.tfplan" >> "$GITHUB_OUTPUT"
              echo "state-key=dev/landit-iac/terraform.tfstate" >> "$GITHUB_OUTPUT"
              echo "apply-environment=terraform-apply-develop" >> "$GITHUB_OUTPUT"
              ;;
            production)
              echo "root=environments/prod" >> "$GITHUB_OUTPUT"
              echo "plan-file=production.tfplan" >> "$GITHUB_OUTPUT"
              echo "state-key=prod/landit-iac/terraform.tfstate" >> "$GITHUB_OUTPUT"
              echo "apply-environment=terraform-apply-production" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::Unknown target: $TARGET"
              exit 1
              ;;
          esac

      - name: Show execution summary
        run: |
          cat <<EOF
          Target: ${{ inputs.target }}
          Operation: ${{ inputs.operation }}
          Terraform root: ${{ steps.target.outputs.root }}
          AWS account: 982529430654
          AWS region: $AWS_REGION
          State bucket: landit-terraform-state-982529430654
          State key: ${{ steps.target.outputs.state-key }}
          Apply environment: ${{ steps.target.outputs.apply-environment }}
          EOF

      - name: Require main branch for apply
        if: ${{ inputs.operation == 'plan-and-apply' && github.ref != 'refs/heads/main' }}
        run: |
          echo "::error::Apply is only allowed from refs/heads/main."
          exit 1

      - name: Require production confirmation
        if: ${{ inputs.operation == 'plan-and-apply' && inputs.target == 'production' && inputs.confirm_environment != 'production' }}
        run: |
          echo "::error::Production apply requires confirm_environment=production."
          exit 1

      - name: Check AWS role variable
        env:
          AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
        run: |
          if [ -z "$AWS_ROLE_ARN" ]; then
            echo "::error::Set AWS_ROLE_ARN as a repository or environment variable."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}

      - name: Terraform fmt check
        run: terraform fmt -recursive -check

      - name: Terraform init
        run: terraform -chdir="${{ steps.target.outputs.root }}" init -input=false

      - name: Terraform validate
        run: terraform -chdir="${{ steps.target.outputs.root }}" validate

      - name: Terraform plan
        run: terraform -chdir="${{ steps.target.outputs.root }}" plan -input=false -out="$RUNNER_TEMP/${{ steps.target.outputs.plan-file }}"

      - name: Show plan
        run: terraform -chdir="${{ steps.target.outputs.root }}" show -no-color "$RUNNER_TEMP/${{ steps.target.outputs.plan-file }}"

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ inputs.target }}
          path: ${{ runner.temp }}/${{ steps.target.outputs.plan-file }}
          if-no-files-found: error
          retention-days: 1

  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: plan
    if: ${{ inputs.operation == 'plan-and-apply' }}
    environment: terraform-apply-${{ inputs.target }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check AWS role variable
        env:
          AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
        run: |
          if [ -z "$AWS_ROLE_ARN" ]; then
            echo "::error::Set AWS_ROLE_ARN as a repository or environment variable."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan-${{ inputs.target }}
          path: ${{ runner.temp }}/terraform-plan

      - name: Terraform init
        run: terraform -chdir="${{ needs.plan.outputs.root }}" init -input=false

      - name: Terraform apply
        run: terraform -chdir="${{ needs.plan.outputs.root }}" apply -input=false "$RUNNER_TEMP/terraform-plan/${{ needs.plan.outputs.plan-file }}"
