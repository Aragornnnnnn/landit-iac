name: Terraform

on:
  workflow_dispatch:
    inputs:
      target:
        description: Terraform root to run.
        required: true
        type: choice
        default: dev
        options:
          - bootstrap-state-backend
          - dev
          - prod
      apply:
        description: Run apply after plan and terraform-apply environment approval.
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-${{ inputs.target }}
  cancel-in-progress: false

env:
  AWS_REGION: ap-northeast-2
  TF_IN_AUTOMATION: "true"

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    environment: terraform-plan
    outputs:
      plan-file: ${{ steps.target.outputs.plan-file }}
      root: ${{ steps.target.outputs.root }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Resolve Terraform root
        id: target
        env:
          TARGET: ${{ inputs.target }}
        run: |
          case "$TARGET" in
            bootstrap-state-backend)
              echo "root=bootstrap/state-backend" >> "$GITHUB_OUTPUT"
              echo "plan-file=bootstrap-state-backend.tfplan" >> "$GITHUB_OUTPUT"
              ;;
            dev)
              echo "root=environments/dev" >> "$GITHUB_OUTPUT"
              echo "plan-file=dev.tfplan" >> "$GITHUB_OUTPUT"
              ;;
            prod)
              echo "root=environments/prod" >> "$GITHUB_OUTPUT"
              echo "plan-file=prod.tfplan" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::Unknown target: $TARGET"
              exit 1
              ;;
          esac

      - name: Require main branch for apply
        if: ${{ inputs.apply == true && github.ref != 'refs/heads/main' }}
        run: |
          echo "::error::Apply is only allowed from refs/heads/main."
          exit 1

      - name: Check AWS role variable
        env:
          AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
        run: |
          if [ -z "$AWS_ROLE_ARN" ]; then
            echo "::error::Set AWS_ROLE_ARN as a repository or environment variable."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}

      - name: Terraform fmt check
        run: terraform fmt -recursive -check

      - name: Terraform init
        run: terraform -chdir="${{ steps.target.outputs.root }}" init -input=false

      - name: Terraform validate
        run: terraform -chdir="${{ steps.target.outputs.root }}" validate

      - name: Terraform plan
        run: terraform -chdir="${{ steps.target.outputs.root }}" plan -input=false -out="$RUNNER_TEMP/${{ steps.target.outputs.plan-file }}"

      - name: Show plan
        run: terraform -chdir="${{ steps.target.outputs.root }}" show -no-color "$RUNNER_TEMP/${{ steps.target.outputs.plan-file }}"

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ inputs.target }}
          path: ${{ runner.temp }}/${{ steps.target.outputs.plan-file }}
          if-no-files-found: error
          retention-days: 1

  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: plan
    if: ${{ inputs.apply == true }}
    environment: terraform-apply
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check AWS role variable
        env:
          AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
        run: |
          if [ -z "$AWS_ROLE_ARN" ]; then
            echo "::error::Set AWS_ROLE_ARN as a repository or environment variable."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan-${{ inputs.target }}
          path: ${{ runner.temp }}/terraform-plan

      - name: Terraform init
        run: terraform -chdir="${{ needs.plan.outputs.root }}" init -input=false

      - name: Terraform apply
        run: terraform -chdir="${{ needs.plan.outputs.root }}" apply -input=false "$RUNNER_TEMP/terraform-plan/${{ needs.plan.outputs.plan-file }}"
